<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serran - Gerador de Termos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="app-bar">
        <div class="logo-container">
            <img src="assets/logo.jpg" alt="Serran Logo" onerror="this.style.display='none'">
            <span>STRS - Sistema de Termos de Responsabilidade Serrana</span>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <div class="card">
                <header>
                    <h1>Gerador de Termos</h1>
                    <p>Preencha os campos abaixo para emitir o documento de responsabilidade.</p>
                </header>

                <form id="term-form">
                    <div class="form-group full-width">
                        <label for="category">Categoria</label>
                        <select id="category" name="category" required>
                            <option value="TI. > Empréstimo de aparelho > Termo de Responsabilidade" selected>
                                TI. > Empréstimo de aparelho > Termo de Responsabilidade
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="name">Nome Completo</label>
                        <input type="text" id="name" name="name" placeholder="Nome do colaborador" required>
                    </div>

                    <div class="form-group">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
                    </div>

                    <div class="form-group">
                        <label for="brand">Marca</label>
                        <input type="text" id="brand" name="brand" placeholder="Ex: Samsung, Apple" required>
                    </div>

                    <div class="form-group">
                        <label for="model">Modelo</label>
                        <input type="text" id="model" name="model" placeholder="Ex: Galaxy A54" required>
                    </div>

                    <div class="form-group">
                        <label for="imei">IMEI / Número de Série</label>
                        <input type="text" id="imei" name="imei" placeholder="Número identificador" required>
                    </div>

                    <div class="form-group">
                        <label for="value">Valor do Equipamento (R$)</label>
                        <input type="text" id="value" name="value" placeholder="0,00" required>
                    </div>

                    <div class="form-group">
                        <label for="delivery-date">Data de Entrega</label>
                        <input type="date" id="delivery-date" name="delivery_date" required>
                    </div>

                    <div class="form-group">
                        <label for="return-date">Data de Devolução (Opcional)</label>
                        <input type="date" id="return-date" name="return_date">
                    </div>

                    <div class="form-group full-width">
                        <label for="description">Descrição / Observações</label>
                        <textarea id="description" name="description"
                            placeholder="Detalhes sobre o estado do aparelho, acessórios inclusos (carregador, capa, etc)."></textarea>
                    </div>

                    <div class="btn-container">
                        <button type="submit" id="generate-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />
                                <polyline points="14 2 14 8 20 8" />
                                <path d="M12 18v-6" />
                                <path d="m9 15 3 3 3-3" />
                            </svg>
                            Gerar Termo de Responsabilidade
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>

</html>
